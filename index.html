<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviation Maintenance Self-Test</title>
    <style>
        :root {
            --primary-color: #0056b3;
            --secondary-color: #004494;
            --correct-color: #28a745;
            --incorrect-color: #dc3545;
            --bg-color: #f4f7f6;
            --text-color: #333;
            --box-bg: #fff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--box-bg);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h1, h2, h3 {
            color: var(--primary-color);
            text-align: center;
        }

        .hidden {
            display: none !important;
        }

        /* Home Page Styles */
        .exam-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
            text-align: center;
            font-weight: bold;
        }

        .btn:hover {
            background-color: var(--secondary-color);
        }

        .btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        /* Quiz Page Styles */
        .header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        .progress {
            font-weight: bold;
            color: #666;
        }

        .question-text {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .option {
            background-color: #f8f9fa;
            border: 2px solid #ddd;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 16px;
        }

        .option:hover {
            background-color: #e2e6ea;
            border-color: #ccc;
        }

        .option.selected {
            background-color: #dbeafe;
            border-color: var(--primary-color);
        }

        .option.correct {
            background-color: #d4edda;
            border-color: var(--correct-color);
            color: #155724;
        }

        .option.incorrect {
            background-color: #f8d7da;
            border-color: var(--incorrect-color);
            color: #721c24;
        }

        .explanation {
            background-color: #e2e3e5;
            border-left: 5px solid var(--primary-color);
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 0 5px 5px 0;
            font-size: 16px;
        }

        .amharic {
            font-family: 'Nyala', 'Noto Sans Ethiopic', sans-serif;
            font-size: 18px;
        }

        .controls {
            display: flex;
            justify-content: space-between;
        }

        /* Results Page Styles */
        .results-container {
            text-align: center;
        }

        .score-display {
            font-size: 48px;
            font-weight: bold;
            color: var(--primary-color);
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Home Page -->
        <div id="home-page">
            <h1>Aviation Maintenance Self-Test</h1>
            <p style="text-align: center;">Select a module to begin your self-test. Detailed explanations will be provided in Amharic.</p>
            <div class="exam-list" id="exam-list-container">
                <!-- Exam buttons will be injected here via JS -->
            </div>
        </div>

        <!-- Quiz Page -->
        <div id="quiz-page" class="hidden">
            <div class="header-controls">
                <button class="btn" style="background-color: #6c757d;" onclick="backToHome()">Back to Exams</button>
                <div class="progress" id="progress-indicator">Question 1 of X</div>
            </div>
            
            <h2 id="quiz-title">Exam Title</h2>
            <div class="question-text" id="question-text">Question goes here?</div>
            
            <div class="options" id="options-container">
                <!-- Options injected here via JS -->
            </div>

            <div id="explanation-container" class="explanation hidden">
                <strong>Explanation (ማብራሪያ):</strong>
                <p id="explanation-text" class="amharic"></p>
            </div>

            <div class="controls">
                <button class="btn" id="submit-btn" onclick="submitAnswer()">Submit Answer</button>
                <button class="btn hidden" id="next-btn" onclick="nextQuestion()">Next Question</button>
            </div>
        </div>

        <!-- Results Page -->
        <div id="result-page" class="hidden">
            <h1>Exam Completed!</h1>
            <div class="results-container">
                <p>Your Final Score:</p>
                <div class="score-display" id="final-score">0 / 0</div>
                <div style="display: flex; justify-content: center; gap: 20px; margin-top: 30px;">
                    <button class="btn" onclick="restartExam()">Restart Current Exam</button>
                    <button class="btn" style="background-color: #6c757d;" onclick="backToHome()">Back to Exams</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Database of all exams, questions, and Amharic explanations
        const examsData =[
            {
                title: "Exam 1: PP02 M3 (35 Questions)",

                    {

                    {

                    {
                        q: "What causes hot start?",
                        options:["Fuel rich starting / Residual fuel", "Cold weather condition", "High air pressure from APU", "Fast spinning of starter"],
                        correct: 0,
                        exp: "ሆት ስታርት (Hot start) የሚፈጠረው ሞተሩ ውስጥ በቂ አየር ሳይኖር ቀርቶ (ወይም ትርፍ ነዳጅ ኖሮ) ሲነሳ ነው። አየሩ ማቀዝቀዝ ስለማይችል ሙቀቱ (EGT) ጣሪያ ይነካል።"
                    }
                ]
            }
        ];

        let currentExamIndex = 0;
        let currentQuestionIndex = 0;
        let score = 0;
        let selectedOption = -1;

        // Initialize the Home Page
        function init() {
            const listContainer = document.getElementById('exam-list-container');
            listContainer.innerHTML = '';
            
            examsData.forEach((exam, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.innerText = exam.title;
                btn.onclick = () => startExam(index);
                listContainer.appendChild(btn);
            });
        }

        // Start an Exam
        function startExam(index) {
            currentExamIndex = index;
            currentQuestionIndex = 0;
            score = 0;
            
            document.getElementById('home-page').classList.add('hidden');
            document.getElementById('result-page').classList.add('hidden');
            document.getElementById('quiz-page').classList.remove('hidden');
            
            document.getElementById('quiz-title').innerText = examsData[index].title;
            
            renderQuestion();
        }

        // Render current question
        function renderQuestion() {
            const exam = examsData[currentExamIndex];
            const qData = exam.questions[currentQuestionIndex];
            selectedOption = -1;

            document.getElementById('progress-indicator').innerText = `Question ${currentQuestionIndex + 1} of ${exam.questions.length}`;
            document.getElementById('question-text').innerText = qData.q;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            qData.options.forEach((opt, idx) => {
                const optDiv = document.createElement('div');
                optDiv.className = 'option';
                optDiv.innerText = `${String.fromCharCode(65 + idx)}) ${opt}`;
                optDiv.onclick = () => selectOption(idx, optDiv);
                optionsContainer.appendChild(optDiv);
            });

            document.getElementById('submit-btn').classList.remove('hidden');
            document.getElementById('next-btn').classList.add('hidden');
            document.getElementById('explanation-container').classList.add('hidden');
            document.getElementById('submit-btn').disabled = true;
        }

        // Handle option selection
        function selectOption(index, element) {
            // If already submitted, prevent changing
            if(!document.getElementById('submit-btn').classList.contains('hidden') === false) return;

            selectedOption = index;
            const allOptions = document.querySelectorAll('.option');
            allOptions.forEach(opt => opt.classList.remove('selected'));
            element.classList.add('selected');
            document.getElementById('submit-btn').disabled = false;
        }

        // Submit the answer and show feedback/explanation
        function submitAnswer() {
            if (selectedOption === -1) return;

            const exam = examsData[currentExamIndex];
            const qData = exam.questions[currentQuestionIndex];
            const allOptions = document.querySelectorAll('.option');

            // Highlight Correct and Incorrect
            allOptions.forEach((opt, idx) => {
                if (idx === qData.correct) {
                    opt.classList.add('correct');
                } else if (idx === selectedOption) {
                    opt.classList.add('incorrect');
                }
                opt.style.pointerEvents = 'none'; // Disable further clicking
            });

            if (selectedOption === qData.correct) {
                score++;
            }

            // Show explanation
            document.getElementById('explanation-text').innerText = qData.exp;
            document.getElementById('explanation-container').classList.remove('hidden');

            // Toggle buttons
            document.getElementById('submit-btn').classList.add('hidden');
            
            if (currentQuestionIndex < exam.questions.length - 1) {
                document.getElementById('next-btn').innerText = "Next Question";
            } else {
                document.getElementById('next-btn').innerText = "Show Results";
            }
            document.getElementById('next-btn').classList.remove('hidden');
        }

        // Move to next question or end exam
        function nextQuestion() {
            const exam = examsData[currentExamIndex];
            if (currentQuestionIndex < exam.questions.length - 1) {
                currentQuestionIndex++;
                renderQuestion();
            } else {
                showResults();
            }
        }

        // Show final score
        function showResults() {
            document.getElementById('quiz-page').classList.add('hidden');
            document.getElementById('result-page').classList.remove('hidden');
            
            const exam = examsData[currentExamIndex];
            document.getElementById('final-score').innerText = `${score} / ${exam.questions.length}`;
        }

        // Restart current exam
        function restartExam() {
            startExam(currentExamIndex);
        }

        // Back to Home page
        function backToHome() {
            document.getElementById('quiz-page').classList.add('hidden');
            document.getElementById('result-page').classList.add('hidden');
            document.getElementById('home-page').classList.remove('hidden');
        }

        // Initialize App
        init();
    </script>
