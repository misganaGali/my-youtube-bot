<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviation Maintenance Self-Test</title>
    <style>
        :root {
            --primary-color: #0056b3;
            --secondary-color: #004494;
            --correct-color: #28a745;
            --incorrect-color: #dc3545;
            --bg-color: #f4f7f6;
            --text-color: #333;
            --box-bg: #fff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--box-bg);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1, h2, h3 {
            color: var(--primary-color);
            text-align: center;
        }

        .hidden {
            display: none !important;
        }

        /* Home Page Styles */
        .exam-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            text-align: center;
            font-weight: bold;
        }

        .btn:hover {
            background-color: var(--secondary-color);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        /* Quiz Page Styles */
        .header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        .progress {
            font-weight: bold;
            color: #666;
            font-size: 1.1em;
        }

        .question-text {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .option {
            background-color: #f8f9fa;
            border: 2px solid #ddd;
            padding: 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 16px;
            display: flex;
            align-items: center;
        }

        .option:hover {
            background-color: #e2e6ea;
            border-color: #ccc;
        }

        .option.selected {
            background-color: #dbeafe;
            border-color: var(--primary-color);
        }

        .option.correct {
            background-color: #d4edda !important;
            border-color: var(--correct-color) !important;
            color: #155724;
            font-weight: bold;
        }

        .option.incorrect {
            background-color: #f8d7da !important;
            border-color: var(--incorrect-color) !important;
            color: #721c24;
        }

        .explanation {
            background-color: #e2e3e5;
            border-left: 5px solid var(--primary-color);
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 0 5px 5px 0;
            font-size: 16px;
        }

        .amharic {
            font-family: 'Nyala', 'Noto Sans Ethiopic', sans-serif;
            font-size: 18px;
            margin-top: 10px;
            line-height: 1.8;
        }

        .controls {
            display: flex;
            justify-content: space-between;
        }

        /* Results Page Styles */
        .results-container {
            text-align: center;
        }

        .score-display {
            font-size: 54px;
            font-weight: bold;
            color: var(--primary-color);
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Home Page -->
        <div id="home-page">
            <h1>Aviation Maintenance Self-Test</h1>
            <p style="text-align: center; font-size: 1.1em; color: #555;">Select an exam module to begin. Detailed explanations are provided in Amharic.</p>
            <div class="exam-list" id="exam-list-container">
                <!-- Buttons injected via JS -->
            </div>
        </div>

        <!-- Quiz Page -->
        <div id="quiz-page" class="hidden">
            <div class="header-controls">
                <button class="btn" style="background-color: #6c757d;" onclick="backToHome()">Back to Exams</button>
                <div class="progress" id="progress-indicator">Question 1 of X</div>
            </div>
            
            <h2 id="quiz-title">Exam Title</h2>
            <div class="question-text" id="question-text">Question goes here?</div>
            
            <div class="options" id="options-container">
                <!-- Options injected via JS -->
            </div>

            <div id="explanation-container" class="explanation hidden">
                <strong>Detailed Explanation (ማብራሪያ):</strong>
                <p id="explanation-text" class="amharic"></p>
            </div>

            <div class="controls">
                <button class="btn" id="submit-btn" onclick="submitAnswer()">Submit Answer</button>
                <button class="btn hidden" id="next-btn" onclick="nextQuestion()">Next Question</button>
            </div>
        </div>

        <!-- Results Page -->
        <div id="result-page" class="hidden">
            <h1>Exam Completed!</h1>
            <div class="results-container">
                <p style="font-size: 20px;">Your Final Score:</p>
                <div class="score-display" id="final-score">0 / 0</div>
                <div style="display: flex; justify-content: center; gap: 20px; margin-top: 30px;">
                    <button class="btn" onclick="restartExam()">Restart Current Exam</button>
                    <button class="btn" style="background-color: #6c757d;" onclick="backToHome()">Back to Exams</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Data Structure: q = Question, o = Options (Index 0 is ALWAYS the correct answer in this raw data), e = Amharic Explanation
        const examsData =[
            {
                title: "Exam 1",
                questions:[
                    {q: "Where is the location of the Thrust lever and the Start lever?", o:["In the cockpit", "On the engine", "In the E and E compartment", "In the cabin"], e: "የጉልበት ማዘዣ (Thrust lever) እና የማስነሻ ማዘዣ (Start lever) አብራሪዎች ሞተሩን በቀላሉ እንዲቆጣጠሩ ለማስቻል በአብራሪው ክፍል (Cockpit) ውስጥ ይገኛሉ።"},
                    {q: "How many positions does the start lever have?", o: ["Two", "Three", "One", "Four"], e: "የማስነሻ ማዘዣው (Start lever) ሁለት ቦታዎች (positions) አሉት፡ እነርሱም IDLE (ክፍት) እና CUTOFF (ዝግ) ናቸው።"},
                    {q: "In the Ignition system, the ____ transforms the input voltage to a pulsed high-voltage output through solid-state circuitry, transformers, and diodes.", o:["Exciter BOX", "Igniter Plug", "Ignition Lead", "Capacitor"], e: "ኤክሳይተር ቦክስ (Exciter box) የኤሌክትሪክ ኃይልን ተቀብሎ ወደ እጅግ ከፍተኛ ቮልቴጅ በመቀየር ለፕለጉ (igniter) የሚያቀብል የሲስተሙ ልብ ነው።"},
                    {q: "Which sentence describes the term flameout?", o:["When the fire unintentionally goes out", "Improper fuel ignition mixture", "Restricting ignition", "Normal engine shutdown"], e: "ፍሌም-አውት (Flameout) ማለት ሞተሩ እየሰራ እያለ በድንገት እና ካልታሰበበት ሁኔታ እሳቱ ሲጠፋ የሚፈጠር አደገኛ ክስተት ነው።"},
                    {q: "You check for weak battery and recharge the battery as a remedy when troubleshooting in the ignition system when there is:", o:["Long interval between the sparks", "No igniter spark when the system is ON", "Continuous sparks", "Cracked ceramic insulation"], e: "በባህሪው ባትሪው ሲደክም የማቀጣጠያው ካፓሲተር ኃይል ለማከማቸት ረጅም ጊዜ ስለሚወስድበት በብልጭታዎቹ መካከል ያለው የጊዜ ልዩነት (Long interval) ይረዝማል።"},
                    {q: "Weak spark can be created due to:", o:["Cracked ceramic insulation", "Hot electrode erosion", "Incorrect power input to the transformer unit", "Loose battery connection"], e: "በኢግኒተር ፕለጉ ላይ ያለው የሴራሚክ መከላከያ (Ceramic insulation) ከተሰነጠቀ፣ የኤሌክትሪክ ኃይሉ በትክክል ሳይደርስ ስለሚባክን ደካማ ብልጭታ (Weak spark) ይፈጠራል።"},
                    {q: "When starting an engine which one comes first?", o:["Rotating the engine", "Ignition", "Fuel", "Starter disconnect"], e: "ሞተር ሲነሳ ቅደም ተከተሉ መጀመሪያ አየር እንዲገባ ሞተሩን ማሽከርከር (Rotating)፣ በመቀጠል ማቀጣጠል (Ignition)፣ ከዚያም ነዳጅ (Fuel) መክፈት ነው።"},
                    {q: "When starting an engine which one comes last?", o: ["Starter disconnect", "Fuel cutoff", "Ignition de-energies", "Rotating the engine"], e: "ሞተሩ ራሱን ችሎ ነዳጅ እያቃጠለ መቆም ሲችል፣ በመጨረሻ የሚከናወነው ሒደት ማስነሻው (Starter) ራሱን ከሞተሩ ማላቀቅ (Disconnect) ነው።"},
                    {q: "The air turbine starter used in most gas turbine engine is protected from attaining too high speed if the ratchet should fail to release the clutch by:", o:["Drive shaft shear section", "Dual stage reduction gear", "Clutch pawl leaf spring", "Pressure regulating valve"], e: "ክላቹ ሳይላቀቅ ቀርቶ ሞተሩ ስታርተሩን በከፍተኛ ፍጥነት ቢያሽከረክረው ስታርተሩ እንዳይፈነዳ ብሎ የተሰራው ዘንግ (Shear section) ራሱን ቆርጦ ያድነዋል።"},
                    {q: "During engine starting, at which percentage of N2 the starter disengaged?", o:["55% of N2", "30% of N1", "60% of N1", "45% of N2"], e: "ሞተሩ ራሱን ሲችል የውስጠኛው ሞተር (N2) ፍጥነት ከ 50% እስከ 55% ሲደርስ ማስነሻው (Starter) ራሱን ያላቅቃል።"},
                    {q: "Which starter is used for small gas turbine engine?", o:["Electrical motor", "Air impingement starter", "Gas turbine starter", "Cartridge starter"], e: "ለትናንሽ የጋዝ ተርባይን ሞተሮች (ለምሳሌ APU) ክብደታቸው ቀላል የሆኑ የኤሌክትሪክ ማስነሻ ሞተሮች (Electrical motors) ይመረጣሉ።"},
                    {q: "The _____ winding in the starter-generator is used to develop the low-speed, high starting torque necessary to crank the engine.", o:["Series", "Shunt", "Both", "Parallel"], e: "በስታርተር-ጄኔሬተር ውስጥ 'Series' ጠምዛዛዎች (Windings) ሞተሩን ለማስነሳት የሚያስፈልገውን ከፍተኛ ጉልበት (High starting torque) ለማምረት ያገለግላሉ።"},
                    {q: "An air turbine starter used in most gas turbine engines requires compressed air with:", o:["A large Volume and Low pressure", "Small volume and low pressure", "A large Volume and high pressure", "Small volume and high pressure"], e: "የአየር ተርባይን ማስነሻ በተፈጥሮው ትልቅ የአየር መጠን (Large Volume) ነገር ግን ዝቅተኛ ግፊት (Low pressure - ከ30-50 psi) ይፈልጋል።"},
                    {q: "Which of the following is the most widely used starter?", o:["Air turbine starter", "Cartridge starter", "Air impingement starter", "Electrical motor"], e: "በትላልቅ የንግድ አውሮፕላኖች ላይ በብዛት ጥቅም ላይ የሚውለው አነስተኛ ክብደት ኖሮት ከፍተኛ ጉልበት የሚያመነጨው የአየር ተርባይን ማስነሻ (Air Turbine Starter) ነው።"},
                    {q: "Why do we need to connect starter at the N2 on dual spool engine?", o:["Less weight to start", "Easy for connecting the starter", "Closer to the combustion chamber", "Provides more airflow"], e: "የውስጠኛውን (N2) ሞተር ብቻ ማሽከርከር ቀላል እና አነስተኛ ክብደት (Less weight to start) ስለሚኖረው፣ አነስተኛ ኃይል በመጠቀም ሞተሩን ለማስነሳት ይረዳል።"},
                    {q: "In troubleshooting, when there is a weak spark on the sparks:", o: ["Igniter plug", "Power supply", "Transformer Unit", "Exciter box"], e: "ደካማ ብልጭታ (Weak spark) ብዙውን ጊዜ የሚፈጠረው የኢግኒተር ፕለጉ (Igniter plug) የሴራሚክ መከላከያ ሲሰነጠቅ ወይም ሲያረጅ ነው።"},
                    {q: "Which type of starter withstand high temperature with burning solid propellant?", o:["Cartridge/pneumatic starter", "Air turbine starter", "Electrical motor", "Air impingement starter"], e: "ካርትሪጅ (Cartridge) ስታርተር ልክ እንደ ጥይት ደረቅ ነዳጅ አቃጥሎ በሚያመነጨው ትኩስ ጋዝ የሚሰራ የማስነሻ ዓይነት ነው።"},
                    {q: "Primary purpose of APU:", o:["Provide pneumatic power", "Provide thrust", "Cool the engine", "Provide hydraulic power"], e: "የ APU ዋነኛ ዓላማ አውሮፕላኑ መሬት ላይ እያለ የአየር ኃይል (Pneumatic power) በማቅረብ ዋና ዋና ሞተሮችን ማስነሳት ነው።"},
                    {q: "AVM unit test bite is done on:", o: ["Unit itself", "EICAS display", "Primary flight display", "Engine control panel"], e: "የንዝረት መለኪያ (AVM) ጤንነቱን የሚመረምረው BITE (Built-In Test Equipment) በራሱ በመሣሪያው (Unit itself) ላይ ይከናወናል።"},
                    {q: "What senses compressor turbine speed?", o:["Tachometer", "AVM", "EGT sensor", "EPR probe"], e: "የሞተርን የማሽከርከር ፍጥነት (RPM) የሚለካው እና ወደ ስክሪን የሚያስተላልፈው መሣሪያ ታኮሜትር (Tachometer) ይባላል።"},
                    {q: "What changes the forward and reverse motion of thrust lever into analog electrical signal?", o: ["Resolver", "Bellcrank", "Push-pull rod", "Pulley"], e: "በዘመናዊ የሞተር መቆጣጠሪያዎች (FADEC) ላይ የThrust leverን እንቅስቃሴ ወደ ኤሌክትሪክ መልዕክት (Analog signal) የሚቀይረው 'Resolver' (ሪዞልቨር) ነው።"},
                    {q: "What prevents simultaneous movement of forward and reverse thrust levers?", o: ["Interlock mechanism", "Thrust control drum", "Brake drum", "Detent catch"], e: "አብራሪው ወደ ፊት (Forward) እና ወደ ኋላ (Reverse) የሚያስኬዱትን የጉልበት ማዘዣዎች በአንድ ጊዜ እንዳይጠቀም የሚቆልፈው Interlock mechanism ነው።"},
                    {q: "Which of following doesn’t give information to the AVM?", o:["EGT", "Number 1 bearing vibration sensor", "Fan frame compressor case vertical vibration sensor", "Turbine vibration sensor"], e: "EGT የሙቀት መጠን መለኪያ (Exhaust Gas Temperature) እንጂ ንዝረትን (Vibration) አይለካም፤ ስለዚህ ለ AVM መረጃ አይሰጥም።"},
                    {q: "EPR ratio is:", o:["Outlet air to inlet air", "Inlet air to outlet air", "Compressor air to turbine air", "Bypass air to core air"], e: "EPR (Engine Pressure Ratio) ማለት ከሞተሩ የሚወጣው ግፊት (Outlet pressure) ለሞተሩ ከሚገባው ግፊት (Inlet pressure) ጋር ሲካፈል የሚመጣው የኃይል (Thrust) መለኪያ ነው።"},
                    {q: "Requirement of air starter:", o: ["Larger volume of air", "High pressure air", "High voltage electrical power", "Small volume of air"], e: "የአየር ተርባይን ማስነሻ በተፈጥሮው ትልቅ የአየር መጠን (Larger Volume of air) ነገር ግን ዝቅተኛ ግፊት ይፈልጋል።"},

                    {q: "Is not true about reconditioning of spark plug =", o:["Using metal brush for safe cleaning", "Replacing if chipped", "Checking gap", "Checking continuity"], e: "ኢግኒተር ፕለግን በብረት ብሩሽ ማጽዳት ፍፁም ስህተት ነው። ጫፉ ላይ ያለውን ጠቃሚ ሴራሚክ/ሴሚኮንዳክተር ስለሚልጠው ነው።"},

                    {q: "Over speed condition safety precaution of starter =", o: ["Shear section", "Relief valve", "Governor", "FADEC cutoff"], e: "ክላቹ ሳይላቀቅ ቀርቶ ሞተሩ ስታርተሩን በከፍተኛ ፍጥነት ቢያሽከረክረው እንዳይፈነዳ ብሎ የተሰራው ዘንግ (Shear section) ራሱን ቆርጦ ያድነዋል።"},

            {

                    {q: "What does a vibrator do =", o: ["Change DC to AC", "Change AC to DC", "Increase current", "Filter noise"], e: "በድሮ ማቀጣጠያዎች ውስጥ ቫይብሬተር (Vibrator) ቀጥታ የኤሌክትሪክ ፍሰትን (DC) ወደ ተለዋዋጭ ቮልቴጅ (Pulsating DC/AC) ለመቀየር ያገለግል ነበር።"},

                    {q: "What is hung start =", o:["If the starter does not get the engine to the correct speed", "Fire in the exhaust", "Starter fails to disengage", "Too much fuel"], e: "ሃንግ ስታርት (Hung start) ማለት ማስነሻው ሞተሩን ወደ ትክክለኛው መነሻ ፍጥነቱ (Idle speed) በበቂ ሁኔታ ማድረስ ሲያቅተውና በመሃል ሲንጠለጠል ነው።"},
                    {q: "Avoid sever electrical shock GTE ignition system is shut at least =", o:["After 5 min engine shutdown", "After 1 min engine shutdown", "Immediately", "After 20 min engine shutdown"], e: "አደገኛ የኤሌክትሪክ ንዝረትን ለማስቀረት፣ ሲስተሙ ከጠፋ በኋላ በካፓሲተሩ ላይ ያለውን ኃይል ወደ መሬት ለማፍሰስ ቢያንስ 5 ደቂቃ መጠበቅ ግዴታ ነው።"},
                    {q: "Which is a primary indication of engine =", o:["EGT", "Oil pressure", "Oil temperature", "Vibration"], e: "EGT የሞተሩን ጤንነት ከሚያሳዩ እና ከተበላሸ ሞተሩን ሊያቀልጡ ከሚችሉ ዋነኛ መለኪያዎች አንዱ ስለሆነ Primary Indication ነው።"},

                    {q: "What does the tachometer indicate =", o:["RPM", "Pressure", "Temperature", "Vibration"], e: "ታኮሜትር (Tachometer) የሞተሩን አብዮት በደቂቃ (RPM - Revolutions Per Minute) በመቶኛ የሚያሳይ መሣሪያ ነው።"},

                    {q: "EPR ratio means =", o:["Outlet AIR to inlet AIR", "Inlet AIR to outlet AIR", "Bypass to core air", "Turbine to compressor air"], e: "EPR (Engine Pressure Ratio) ማለት ከሞተሩ የሚወጣው ግፊት (Outlet) ለሞተሩ ከሚገባው ግፊት (Inlet) ጋር ሲካፈል የሚመጣው የኃይል መለኪያ ነው።"},
                    {q: "Requirement of air starter =", o:["Large volume of air but low pressure", "Small volume of air and high pressure", "High voltage AC", "High voltage DC"], e: "የአየር ተርባይን ማስነሻ በተፈጥሮው ትልቅ የአየር መጠን ነገር ግን ዝቅተኛ ግፊት (Low pressure 30-40 psi) ይፈልጋል።"},
                    {q: "What control ignition and provide initial fuel flow =", o: ["Start control", "Thrust lever", "Fire switch", "Auto-ignition switch"], e: "የማስነሻ መቆጣጠሪያው (Start Control Lever / Fuel Control Switch) ወደ IDLE ሲነሳ ነዳጅ እና ኤሌክትሪክ ለማቀጣጠያው እንዲላክ ያዛል።"},

                    {q: "Starter disengage from the engine due to =", o:["Centrifugal force", "Loss of electrical power", "Pilot command", "Air pressure drop"], e: "ሞተሩ ሲነሳና ፍጥነቱ ሲጨምር የክላቹ ፓውሎች (Clutch pawls) በሴንትሪፉጋል ኃይል (Centrifugal force) ተገፍተው ስታርተሩን ያላቅቃሉ።"},
                    {q: "When the starter-generator function as a generator it uses =", o: ["Shunt winding", "Series winding", "Both series and shunt", "Parallel winding"], e: "በስታርተር-ጄኔሬተር ውስጥ 'Shunt' ዊንዲንጎች ሲስተሙ ኃይል አምራች (Generator) ሆኖ ሲሰራ ጥቅም ላይ ይውላሉ።"},
                    {q: "Continuous ignition system is used =", o:["During take-off and landing", "During engine start on the ground", "During taxiing", "During normal cruise in clear weather"], e: "የማያቋርጥ ማቀጣጠያ አውሮፕላን ሲነሳ እና ሲያርፍ (Take-off and landing) ድንገት ሞተር እንዳይጠፋ እንደ ዋስትና ያገለግላል።"},
                    {q: "Simplest engine starter type =", o:["Impingement starter", "Air turbine starter", "Cartridge starter", "Electrical starter"], e: "ምንም ዓይነት የውስጥ ጊሮች ሳይኖሩት፣ አየርን በቀጥታ በተርባይኑ ብሌዶች ላይ በመርጨት የሚያስነሳው (Impingement starter) በጣም ቀላል አሠራር ነው።"},
                    {q: "Which type of starter is used on small jet aircraft =", o:["Starter generator", "Air turbine starter", "Cartridge starter", "Pneumatic starter"], e: "በአነስተኛ የንግድ አውሮፕላኖች ላይ ክብደት ለመቀነስ ሲባል በአንድ ዕቃ ውስጥ ሁለቱንም ስራ የሚሰራው 'ስታርተር-ጄኔሬተር' በብዛት ጥቅም ላይ ይውላል።"}

            {
                title: "Exam 4",
                questions:[

                    {q: "When starting an engine which one comes first?", o:["Rotating the engine", "Ignition", "Fuel", "Starter disconnect"], e: "ሞተር ሲነሳ ቅደም ተከተሉ መጀመሪያ አየር እንዲገባ ሞተሩን ማሽከርከር (Rotating)፣ ከዚያም ማቀጣጠል፣ በመጨረሻ ነዳጅ መክፈት ነው።"},

                    {q: "Requirement of air starter:", o:["Larger volume of air", "High pressure air", "High voltage electrical power", "Small volume of air"], e: "የአየር ተርባይን ማስነሻ በተፈጥሮው ትልቅ የአየር መጠን ይፈልጋል።"},
                    {q: "Simplest engine starter type:", o:["Turbine impingement starter", "Air turbine starter", "Cartridge starter", "Starter generator"], e: "አየርን በቀጥታ በተርባይኑ ብሌዶች ላይ በመርጨት የሚያስነሳው በጣም ቀላል አሠራር ያለው ነው።"},
                    {q: "What will be function of starter generator after cranking the engine?", o:["As generator", "As starter", "As exciter", "As air pump"], e: "ስታርተር-ጄኔሬተር ሞተሩን ካስነሳ በኋላ እንደ ጄኔሬተር (Generator) ሆኖ ለአውሮፕላኑ ኤሌክትሪክ ያመነጫል።"},
                    {q: "Continuous duty ignition system:", o:["Has no operating limit", "Allows operation for two minutes", "Used only for starting", "Requires 20 minutes cooling"], e: "የማያቋርጥ ማቀጣጠያ አየር ላይ ሞተር እንዳይጠፋ ያለ ምንም የጊዜ ገደብ ሊሰራ ይችላል።"},
                    {q: "Which spool crank 1st during starting on dual spool engine?", o: ["N2 spool", "N1 spool", "Both spools", "HP turbine"], e: "ክብደትን ለመቀነስ ሲባል ማስነሻው የሚያሽከረክረው የውስጠኛውን ከፍተኛ ግፊት ዘንግ (N2 spool) ብቻ ነው።"},
                    {q: "What is the purpose of overrunning clutch?", o:["Engage the starter when engine start", "Disengage the starter when engine starts", "Regulate air pressure", "Prevent overspeed"], e: "በጅማሬ ላይ ኃይልን ለማስተላለፍ ያገናኛል (Engage)፣ ነገር ግን ዋናው ስራው ሞተሩ ሲነሳ ማስነሻውን ከጥፋት መጠበቅ ነው።"},
                    {q: "Which actuator control switch energizes ignition system?", o: ["Start lever", "Thrust lever", "Fire switch", "Auto-ignition switch"], e: "የሞተር ማስነሻ ማዘዣ (Start lever) ወደ IDLE ቦታ ሲደረግ የነዳጅ እና የማቀጣጠያ ዑደቶችን ይከፍታል።"},
                    {q: "Not true regarding igniter plug maintenance:", o:["Uses metal brush for cleaning for clean insulation well and contact", "Replace if chipped", "Check for proper clearance", "Perform continuity check"], e: "ኢግኒተር ፕለግን በብረት ብሩሽ ማጽዳት ፍፁም ስህተት ነው። ሴራሚኩን ይልጠዋል።"},
                    {q: "If air starter spins but doesn’t crank engine, the problem:", o:["Bad overrunning clutch", "Sheared drive shaft", "Low air pressure", "Defective start valve"], e: "ስታርተሩ ራሱ እየሾረ ሞተሩን የማያዞረው ከሆነ፣ ጉልበት የሚያስተላልፈው ክላች ተበላሽቷል።"},
                    {q: "What will be the position of starter valve, if the engine start switch is on the GRD position?", o:["Open", "Closed", "Partially closed", "Auto"], e: "ማብሪያው GRD ላይ ሲደረግ፣ አየር እንዲገባ የማስነሻ ቫልቩ ክፍት (Open) ይሆናል።"},
                    {q: "Most common method of securing air starter on accessary gear box is :", o: ["QAD coupling", "Bolts and nuts", "Screws", "Clamps"], e: "ለማንሳት እና ለመግጠም ቀላል እንዲሆን፣ የአየር ማስነሻዎች በ QAD ካፕሊንግ ይታሰራሉ።"},
                    {q: "The Start valve is operated and actuated", o:["Pneumatically, electrically", "Pneumatically, pneumatically", "Electrically, pneumatically", "Electrically, electrically"], e: "የማስነሻ ቫልቭ የሚንቀሳቀሰው በአየር ኃይል (Pneumatically) ሲሆን፣ ትዕዛዝ የሚቀበለው ግን በኤሌክትሪክ (Electrically) ነው።"},
                    {q: "At approximately what speed is the starter disconnected after starting the engine?", o:["60% of N2", "60% of N1", "30% of N1", "100% of N2"], e: "የውስጠኛው ሞተር (N2) ፍጥነት በግምት ወደ 60% ሲደርስ ሞተሩ ራሱን ችሎ መሽከርከር ስለሚችል ማስነሻው ይቋረጣል።"},
                    {q: "The source of air commonly used to start an engine in a jet transport aircraft is supplied from:", o:["Auxiliary Power Unit", "Compressor Bleed air", "Ground power unit", "Ambient air"], e: "በመንገደኞች አውሮፕላን ላይ ሞተርን ለማስነሳት አየር በዋናነት የሚገኘው ከ APU ነው።"},
                    {q: "____ start is start where turbine or exhaust gas temperature limits are exceeded", o:["Hot", "Hung", "Wet", "Cold"], e: "ሆት ስታርት (Hot start) ማለት ሞተሩ አየር እያጠረው ነዳጅ በብዛት ሲቃጠል የሚፈጠር አደገኛ የሙቀት መጨመር ነው።"},
                    {q: "Which one of the following starter is permanently engaged with the engine?", o:["Starter generator", "Direct cranking", "Air turbine starter", "Cartridge starter"], e: "ስታርተር-ጄኔሬተር ሞተሩን ካስነሳ በኋላ እንደ ኤሌክትሪክ አመንጪ ሆኖ ስለሚቀጥል ከሞተሩ ጋር በቋሚነት የተያያዘ ነው።"},
                    {q: "____ is a small GTE without compressor", o:["Cartridge/Pneumatic Turbine Engine Starter", "Fuel-air combustion starter", "Air Turbine Starter", "Electrical Starter"], e: "ካርትሪጅ ስታርተር የራሱ የሆነ ኮምፕሬሰር ሳይኖረው በደረቅ ነዳጅ ትኩስ ጋዝ የሚያመነጭ የሞተር ማስነሻ ነው።"},
                    {q: "What will be the case if an engine flames out during take-off phase?", o:["Auto ignition", "Flameout", "Loss of ignition", "Engine shutdown"], e: "በአውሮፕላን መነሳት (Take-off) ወቅት ሞተር ቢጠፋ፣ Auto Ignition ሲስተሙ ወዲያውኑ በማወቅ ራሱ ያቀጣጥለዋል።"},
                    {q: "What is the component that changes DC power to high voltage AC power on GTE?", o:["Exciter", "Igniter", "Magneto", "Resolver"], e: "የማቀጣጠያው ኤክሳይተር ዝቅተኛ የዲሲ ኃይልን ተቀብሎ ወደ ከፍተኛ ቮልቴጅ በመቀየር ብልጭታ እንዲፈጠር ያደርጋል።"},
                    {q: "Which of the following is NOT true about auto ignition system?", o:["Used during engine start only as a failsafe", "Serves as a backup during takeoff and landing", "Used for flight conditions in which the engine could flameout", "Activates automatically"], e: "አውቶ-ኢግኒሽን የሚሰራው ሞተር በማስነሳት ሒደት ብቻ ሳይሆን፣ አውሮፕላኑ አየር ላይ በረዶ ውስጥ ሲገባ ጭምር ነው።"},
                    {q: "One is NOT TRUE regarding ignition system check/test", o:["Can be carried out inside the hangar or when flammable vapors are present", "Never be carried out on a fuel-wetted engine", "It should never be done when fueling the aircraft", "Wait 5 mins after turning off"], e: "ማቀጣጠያን መፈተሽ ኃይለኛ እሳት ስለሚፈጥር በሃንጋር ውስጥ ወይም ተቀጣጣይ ጋዝ ባለበት ቦታ ፈጽሞ የተከለከለ ነው።"},
                    {q: "Interference with electronic equipment installed in the aircraft by the electromagnetic energy generated in the ignition exciter is prevented by", o: ["Pi-filter", "Capacitor", "Trigger transformer", "Diode"], e: "የ ፓይ-ማጣሪያ (Pi-filter) ከፍተኛ ቮልቴጁ የሚፈጥረውን የኤሌክትሮማግኔቲክ ጫጫታ አጣርቶ በማስቀረት ሬዲዮን ይከላከላል።"},
                    {q: "Which one of the following Engine parameter is in the EICAS Primary display?", o: ["Exhaust Gas Temperature", "Vibration", "N2", "Oil Pressure"], e: "EGT የሞተሩን ጤንነት ከሚያሳዩ ዋነኛ መለኪያዎች አንዱ ስለሆነ ሁልጊዜም በዋናው ስክሪን ላይ ይታያል።"},
                    {q: "Among subsystems of gas turbine engine indicating system that provides a real-time indication of engine vibration levels is:", o:["The AVM system of the engine", "Low pressure rotor tachometer (N1)", "High pressure rotor tachometer (N2)", "EGT system"], e: "የ AVM (Airborne Vibration Monitoring) ሲስተም የሞተሩን መንቀጥቀጥ ወይም ንዝረት በቀጥታ የሚያሳውቅ መለኪያ ነው።"},
                    {q: "Which one of the following parameters is not displayed in engine primary display?", o:["N2", "EGT", "N1", "EPR"], e: "በአብዛኛው ዘመናዊ አውሮፕላኖች ላይ N2 (የውስጠኛው ሞተር ፍጥነት) በታችኛው/ሁለተኛ ደረጃ ስክሪን ላይ ይታያል።"},
                    {q: "What is the first engine instrument indication for a successful start of a turbine engine?", o:["A rise in the exhaust gas temperature.", "Rise in the engine fuel flow.", "A fall in oil pressure.", "Rise in N1 speed."], e: "እሳት መያዙን (Light-off) በግልፅ የሚያሳየው የመጀመሪያው ምልክት የ EGT (የጭስ ሙቀት) በፍጥነት ከፍ ማለት ነው።"},
                    {q: "Which of the following is not the purpose of Engine control system?", o:["Supplies signals to control the flight controls", "Supplies signals to other airplane systems", "Supplies signals to control the engine", "Regulate fuel flow"], e: "የሞተር መቆጣጠሪያ (Engine Control) ስራው ሞተሩን ማስተዳደር እንጂ የአውሮፕላኑን የበረራ መቆጣጠሪያዎች (Flight controls) ማዘዝ አይደለም።"},
                    {q: "The VM system of gas turbine engine displays the vibration level on:", o:["Secondary EICAS display", "Primary flight Display", "Primary EICAS display", "Navigation Display"], e: "የንዝረት መለኪያ (Vibration level) በአብዛኛው ከሌሎች ሁለተኛ ደረጃ መረጃዎች ጋር በ Secondary EICAS display ላይ ይታያል።"},
                    {q: "The exhaust gas temperature (EGT) indication system monitors the exhaust gas temperature at:", o:["The low pressure turbine nozzles.", "The high pressure compressor", "The high pressure turbine nozzle", "The fan case"], e: "በበርካታ ሞተሮች ላይ EGT የሚለካው በዝቅተኛ ግፊት ተርባይን (LPT) ኖዝሎች አካባቢ ነው።"},
                    {q: "In troubleshooting, the possible cause for long interval between sparks created by the igniter plug is the", o:["Power supply", "Igniter plug", "Transformer Unit", "Exciter Box"], e: "የኃይል አቅርቦቱ (Battery) ከደከመ፣ ካፓሲተሩ ኃይል አከማችቶ ለመተፋት ረጅም ጊዜ ስለሚወስድበት በብልጭታዎቹ መካከል ያለው የጊዜ ቆይታ ይረዝማል።"},
                    {q: "Not true about a starter generation", o:["Only Starting the engine", "Starting the generator", "Provides electrical power", "Acts as starter initially"], e: "ስታርተር-ጄኔሬተር ሞተር በማስነሳት ብቻ አይወሰንም፤ ሞተሩ ከነቃ በኋላ የኤሌክትሪክ ኃይል ያመነጫል።"},
                    {q: "Not a true about tachometer", o:["Sensing from EGT", "RPM", "Sensing transfer from small generator", "Measures N1 and N2"], e: "ታኮሜትር የሞተርን የማሽከርከር ፍጥነት (RPM) የሚለካ እንጂ፣ ሙቀትን ከሚለካው የ EGT ዳሳሽ መረጃ አይቀበልም።"},
                    {q: "High energy system produces high current by Storing electrons in the", o:["Capacitor", "Pi-filter", "Trigger transformer", "Resistor"], e: "ዘመናዊ ማቀጣጠያዎች ኤሌክትሪክን በካፓሲተር ውስጥ አከማችተው በድንገት እና በከፍተኛ ኃይል ይለቁታል።"},
                    {q: "To avoid shock from GTC ignition sys, the technician must wait at least ____", o:["5 min after engine Shutdown", "1 min after engine Shutdown", "20 min after engine Shutdown", "Immediately"], e: "በካፓሲተሩ ውስጥ የቀረ ገዳይ ቮልቴጅ ወደ መሬት እስኪፈስ ቢያንስ 5 ደቂቃ መጠበቅ የህይወት አድን ህግ ነው።"},
                    {q: "An engine tachometer indicates RPM", o:["True", "False"], e: "አዎ! ታኮሜትር የሞተርን የማሽከርከር ፍጥነት በ % RPM የሚለካ መሣሪያ ነው።"},
                    {q: "What controls ignition & provide initial fuel flow?", o: ["Start Control", "Thrust Lever", "Fire Switch", "Ignition Selector"], e: "የማስነሻ መቆጣጠሪያው (Start Control Lever) ነዳጅ እና ኤሌክትሪክ ለማቀጣጠያው እንዲላክ የሚያዝበት ነው።"},
                    {q: "Radioactive materials can be found on", o:["Exciters", "Fuel nozzles", "Turbine blades", "Igniter plugs"], e: "አንዳንድ የድሮ ማቀጣጠያ ኤክሳይተሮች ውስጥ የጋዝ አዮናይዜሽንን ለማገዝ አነስተኛ መጠን ያለው ራዲዮአክቲቭ ማቴሪያል ይገኛል።"},
                    {q: "What does a vibrator do?", o:["Change DC to AC", "Change AC to DC", "Measure vibration", "Reduce noise"], e: "በድሮ ማቀጣጠያዎች ውስጥ ቫይብሬተር (Vibrator) ቀጥታ የኤሌክትሪክ ፍሰትን (DC) ወደ ተለዋዋጭ ቮልቴጅ (AC) ለመቀየር ያገለግል ነበር።"},
                    {q: "AVM display vibration level on secondary display in unit", o:["Unit less", "RPM", "Percent", "Degrees"], e: "የዘመናዊ AVM የንዝረት መለኪያዎች ቁጥርን የሚያሳዩት ያለ ምንም መለኪያ (Unitless scale) ልክ ከ 0.0 እስከ 5.0 ባለው ቁጥር ነው።"},
                    {q: "When the starter generator is used as a generator is used the winding", o: ["Shunt", "Series", "Parallel", "Both"], e: "በስታርተር-ጄኔሬተር ውስጥ 'Shunt' ዊንዲንጎች ሲስተሙ ኃይል አምራች (Generator) ሆኖ ሲሰራ ጥቅም ላይ ይውላሉ።"},
                    {q: "To control air pressure inter to air pneumatic starter", o:["Pressure regulator and shutoff valve", "Fuel metering valve", "Bleed valve", "Surge valve"], e: "ወደ ማስነሻው የሚገባውን ከፍተኛ የአየር ግፊት ለማስተካከል PRSOV (Pressure Regulating and Shutoff Valve) ጥቅም ላይ ይውላል።"},
                    {q: "Sequence of starting", o:["Air-Ignition-Fuel", "Fuel-Air-Ignition", "Air-Fuel-Ignition", "Ignition-Fuel-Air"], e: "የማስነሳት ትክክለኛ ቅደም ተከተል፡ መጀመሪያ አየር፣ ከዚያ ማቀጣጠል፣ በመጨረሻ ነዳጅ።"},
                    {q: "Continues ignition is used in during takeoff and landing", o: ["True", "False"], e: "የማያቋርጥ ማቀጣጠያ አውሮፕላን ሲነሳ እና ሲያርፍ ድንገት ሞተር እንዳይጠፋ እንደ ዋስትና ያገለግላል።"},
                    {q: "Discharge resistor to discharge when circuit is off", o: ["True", "False"], e: "የመልቀቂያ (Discharge) ሬዚስተሮች፣ ሲስተሙ ሲጠፋ የተረፈውን ቮልቴጅ በደህንነት ለማስለቀቅ ያገለግላሉ።"},
                    {q: "Which of the following is not an air source for air starter?", o: ["Ambient air", "GPU", "APU", "Cross-bleed"], e: "ሞተርን ለማስነሳት ከባቢ አየር (Ambient air) በራሱ በቂ ግፊት ስለሌለው አያገለግልም።"},
                    {q: "Secondary indication are displayed on", o:["Center lower display", "Center upper display", "Primary flight display", "Overhead panel"], e: "ሁለተኛ ደረጃ የሞተር መረጃዎች በታችኛው ማዕከላዊ ስክሪን (Center lower display) ላይ ይታያሉ።"},
                    {q: "Which one is NOT a method for engine RPM indication?", o:["Signals from EGT sensors", "Electrically transmitted from a small generator tachometer", "Magnetic pickup", "Optical sensor"], e: "የ EGT ዳሳሾች ሙቀትን እንጂ ፍጥነትን (RPM) ስለማይለኩ ለ RPM መረጃ አይሰጡም።"},
                    {q: "Which type of engine needs a high-energy spark?", o:["Turbine engine", "Turboprop reciprocating engine", "Automobile engine", "Diesel engine"], e: "ተርባይን ሞተር ውስጥ ቀዝቃዛ አየር በፍጥነት ስለሚነፍስ፣ ነዳጁን ለማቀጣጠል እጅግ ከፍተኛ ኃይል (High-energy spark) ይፈልጋል።"},
                    {q: "What are the common types of igniters?", o:["Spark igniter and glow plug", "Glow plug and flow igniter", "Gap igniter and spark igniter", "Arc plug and spark plug"], e: "በጋዝ ተርባይን ሞተሮች ላይ በብዛት ጥቅም ላይ የሚውሉት 'ስፓርክ ኢግኒተር' እና ለትናንሽ ሞተሮች 'ግሎው ፕለግ' ናቸው።"},
                    {q: "The type of starter used by most small business jet turbine engines is", o:["Starter-generators", "Inertia starters", "Air starter", "Cartridge starter"], e: "በአነስተኛ የንግድ አውሮፕላኖች ላይ ክብደት ለመቀነስ 'ስታርተር-ጄኔሬተር' በብዛት ጥቅም ላይ ይውላል።"},
                    {q: "When does a hung start occurs?", o:["Engine failing to reach Idle speed", "Starter Failed to disengage", "Engine passing Idle speed", "Starter not working"], e: "ሃንግ ስታርት (Hung start) ማለት ሞተሩ እሳት ይዞ ነገር ግን አቅም አጥቶ ትክክለኛው መነሻ ፍጥነቱ (Idle speed) ላይ መድረስ ሲያቅተው ነው።"},
                    {q: "Which one is not among the basic type of engine control systems?", o:["Wireless", "Push-pull", "Cable and pulley", "Fly-by-wire"], e: "እስካሁን ባለው አቪዬሽን ሞተርን ለመቆጣጠር በገመድ አልባ (Wireless) ቴክኖሎጂ አንጠቀምም።"},
                    {q: "What will happen to the engine If the starter does not get the engine to the correct speed?", o:["A hung start", "A hot start", "A wet start", "Normal start"], e: "ማስነሻው በቂ ፍጥነት ካልሰጠው ሞተሩ ትክክለኛው መነሻ ፍጥነት ላይ መድረስ ስለሚያቅተው (Hung start) ይፈጠራል።"},
                    {q: "What kind of inspection is required for control cables?", o: ["Inspection of broken cables", "Inspection of bearings", "Inspection of wear on firewall", "Inspection of electrical shorts"], e: "ለቁጥጥር ኬብሎች (Control cables) ዋነኛው ፍተሻ የተበጠሰ ወይም የተበላሸ ኬብል (Frayed/Broken) መኖሩን ማረጋገጥ ነው።"},
                    {q: "What causes hot start?", o:["Fuel rich starting / Residual fuel", "Cold weather condition", "High air pressure", "Fast spinning of starter"], e: "ሞተሩ ውስጥ በቂ አየር ሳይኖር ቀርቶ (ወይም ትርፍ ነዳጅ ኖሮ) ሲነሳ አየሩ ማቀዝቀዝ ስለማይችል Hot start ይፈጠራል።"},
                    {q: "No sound expects from which igniter plug", o: ["Glow plug", "Spark igniter", "Surface-gap igniter", "Recessed igniter"], e: "ግሎው ፕለግ (Glow plug) ልክ እንደ ፍም ስለሚግል የኤሌክትሪክ ብልጭታ ድምፅ አያወጣም።"},
                    {q: "Convert mechanical input to electrical", o:["Resolver", "Bellcrank", "Pulley", "Thermocouple"], e: "በዘመናዊ የሞተር መቆጣጠሪያዎች ላይ እንቅስቃሴን (Mechanical) ወደ ኤሌክትሪክ መልዕክት የሚቀይረው 'Resolver' ነው።"},
                    {q: "The EGT thermocouple indicate temperature", o:["An average value", "Maximum value", "Minimum value", "Inlet value"], e: "በርካታ የ EGT ቴርሞካፕሎች በሞተሩ ዙሪያ ተገጥመው የሚለኩት የሁሉንም አካባቢዎች አማካይ የሙቀት መጠን (Average value) ነው።"},
                    {q: "Which one is disengage with centrifugal force", o:["Clutch pawl", "Exciter", "Igniter plug", "Starter valve"], e: "ሞተሩ ሲነሳና ፍጥነቱ ሲጨምር የክላቹ ፓውሎች በሴንትሪፉጋል ኃይል ተገፍተው ስታርተሩን ያላቅቃሉ።"},
                    {q: "Electrical starter is disengaged by", o: ["Moving the jaws from the engine", "Applying a brake", "Cutting fuel", "Reversing current"], e: "የኤሌክትሪክ ማስነሻ ሞተሩ ራሱን ችሎ ሲቆም የስታርተሩን ጥርሶች ወደ ኋላ በመሳብ ይላቀቃል።"}
                ]
            },
            {

                    {q: "Most common method of securing air starter on accessary gear box is :", o:["QAD coupling", "Bolts and nuts", "Screws", "Clamps"], e: "ለማንሳት እና ለመግጠም ቀላል እንዲሆን፣ የአየር ማስነሻዎች በ QAD ካፕሊንግ ይታሰራሉ።"},
                    {q: "Safety feature used in an air turbine starter to prevent from over speed conditions is:", o:["Drive shaft shear section", "Pressure regulating valve", "Clutch mechanism", "Relief valve"], e: "ክላቹ ሳይላቀቅ ቀርቶ ሞተሩ ስታርተሩን በከፍተኛ ፍጥነት ቢያሽከረክረው እንዳይፈነዳ ዘንጉ ራሱን ቆርጦ ያድነዋል።"},
                    {q: "Which one of the following starter is permanently engaged with the engine?", o:["Starter generator", "Direct cranking", "Air turbine starter", "Pneumatic Starter"], e: "ስታርተር-ጄኔሬተር ሞተሩን ካስነሳ በኋላ እንደ ኤሌክትሪክ አመንጪ ሆኖ ስለሚቀጥል ከሞተሩ ጋር በቋሚነት የተያያዘ ነው።"},
                    {q: "____ is a small GTE without compressor", o:["Cartridge/Pneumatic Turbine Engine Starter", "Fuel-air combustion starter", "Air Turbine Starter", "Starter Generator"], e: "ካርትሪጅ ስታርተር የራሱ የሆነ ኮምፕሬሰር ሳይኖረው በደረቅ ነዳጅ ትኩስ ጋዝ የሚያመነጭ ነው።"},
                    {q: "In troubleshooting, the possible cause for long interval between sparks created by the igniter plug is the_____", o:["Power supply", "Igniter plug", "Transformer Unit", "Exciter Box"], e: "የኃይል አቅርቦቱ ከደከመ፣ ካፓሲተሩ ኃይል አከማችቶ ለመተፋት ረጅም ጊዜ ስለሚወስድበት በብልጭታዎቹ መካከል ያለው የጊዜ ቆይታ ይረዝማል።"},
                    {q: "What will be the case if an engine flames out during take-off phase?", o:["Auto ignition", "Flameout", "Loss of ignition", "Normal condition"], e: "በአውሮፕላን መነሳት (Take-off) ወቅት ሞተር ቢጠፋ፣ Auto Ignition ሲስተሙ ወዲያውኑ በማወቅ ራሱ ያቀጣጥለዋል።"},
                    {q: "What is the component that changes DC power to high voltage AC power on GTE?", o: ["Exciter", "Igniter", "Magneto", "Tachometer"], e: "የማቀጣጠያው ኤክሳይተር ዝቅተኛ የዲሲ ኃይልን ተቀብሎ ወደ ከፍተኛ ቮልቴጅ በመቀየር ብልጭታ እንዲፈጠር ያደርጋል።"},
                    {q: "Which of the following is NOT true about auto ignition system?", o:["Used during engine start only as a failsafe", "Serves as a backup during takeoff and landing", "Used for flight conditions in which the engine could flameout", "Activated automatically"], e: "አውቶ-ኢግኒሽን የሚሰራው ሞተር በማስነሳት ሒደት ብቻ ሳይሆን፣ አውሮፕላኑ አየር ላይ በረዶ ውስጥ ሲገባ ጭምር ነው።"},
                    {q: "One is NOT TRUE regarding ignition system check/test", o:["Can be carried out inside the hangar or when flammable vapors are present", "Never be carried out on a fuel-wetted engine", "It should never be done when fueling the aircraft", "Pull CB before touching"], e: "ማቀጣጠያን መፈተሽ ኃይለኛ እሳት ስለሚፈጥር በሃንጋር ውስጥ ወይም ተቀጣጣይ ጋዝ ባለበት ቦታ ፈጽሞ የተከለከለ ነው።"},
                    {q: "Which sentence describes the term flameout?", o:["When the fire unintentionally goes out in normal operation", "Restricting ignition", "Improper fuel ignition mixture", "Controlled engine shutdown"], e: "ፍሌም-አውት ማለት ሞተሩ እየሰራ እያለ በድንገት እና ካልታሰበበት ሁኔታ እሳቱ ሲጠፋ የሚፈጠር ክስተት ነው።"},
                    {q: "Which one of the following Engine parameter is in the EICAS Primary display?", o:["Exhaust Gas Temperature", "Vibration", "N2", "Oil Temp"], e: "EGT የሞተሩን ጤንነት ከሚያሳዩ ዋነኛ መለኪያዎች አንዱ ስለሆነ ሁልጊዜም በዋናው ስክሪን ላይ ይታያል።"},
                    {q: "Among subsystems of gas turbine engine indicating system that provides a real-time indication of engine vibration levels is:", o:["The AVM system of the engine", "Low pressure rotor tachometer (N1)", "High pressure rotor tachometer (N2)", "EGT Probe"], e: "የ AVM (Airborne Vibration Monitoring) ሲስተም የሞተሩን መንቀጥቀጥ ወይም ንዝረት በቀጥታ የሚያሳውቅ መለኪያ ነው።"},
                    {q: "Which one of the following parameters is not displayed in engine primary display?", o: ["N2", "EGT", "N1", "EPR"], e: "በአብዛኛው ዘመናዊ አውሮፕላኖች ላይ N2 በታችኛው/ሁለተኛ ደረጃ ስክሪን ላይ ይታያል።"},
                    {q: "What is the first engine instrument indication for a successful start of a turbine engine?", o:["A rise in the exhaust gas temperature.", "A rise in the engine fuel flow.", "A fall in oil pressure.", "A rise in RPM."], e: "እሳት መያዙን (Light-off) በግልፅ የሚያሳየው የመጀመሪያው ምልክት የ EGT (የጭስ ሙቀት) በፍጥነት ከፍ ማለት ነው።"},
                    {q: "The VM system of gas turbine engine displays the vibration level on:", o:["Secondary EICAS display", "Primary flight Display", "Primary EICAS display", "Standby instruments"], e: "የንዝረት መለኪያ (Vibration level) በአብዛኛው በሁለተኛው (Secondary EICAS display) ስክሪን ላይ ይታያል።"},
                    {q: "Not true about a starter generation", o:["Only Starting the engine", "Starting the generator", "Generates electricity", "Saves weight"], e: "ስታርተር-ጄኔሬተር ሞተር በማስነሳት ብቻ አይወሰንም፤ ሞተሩ ከነቃ በኋላ የኤሌክትሪክ ኃይል ያመነጫል።"},
                    {q: "Not a true about tachometer", o:["Sensing from EGT", "RPM", "Sensing transfer from small generator", "Measures core speed"], e: "ታኮሜትር የሞተርን የማሽከርከር ፍጥነት የሚለካ እንጂ፣ ሙቀትን ከሚለካው የ EGT ዳሳሽ መረጃ አይቀበልም።"},
                    {q: "High energy system produces high current by Storing electrons in the", o:["Capacitor", "Pi-filter", "Trigger transformer", "Diode"], e: "ዘመናዊ ማቀጣጠያዎች ኤሌክትሪክን በካፓሲተር (Capacitor) ውስጥ አከማችተው በድንገት ይለቁታል።"},
                    {q: "To avoid shock from GTC ignition sys, the technician must wait at least 5 min after engine Shutdown", o: ["True", "False"], e: "በካፓሲተሩ ውስጥ የቀረ ገዳይ ቮልቴጅ ወደ መሬት እስኪፈስ ቢያንስ 5 ደቂቃ መጠበቅ የህይወት አድን ህግ ነው።"},
                    {q: "An engine tachometer indicates RPM", o: ["True", "False"], e: "አዎ፣ ታኮሜትር የሞተርን የማሽከርከር ፍጥነት በ % RPM የሚለካ መሣሪያ ነው።"},
                    {q: "What controls ignition & provide initial fuel flow", o: ["Start Control", "Thrust Control", "Fire Switch", "Ignition Switch"], e: "የማስነሻ መቆጣጠሪያው (Start Control Lever) ነዳጅ እና ኤሌክትሪክ ለማቀጣጠያው እንዲላክ የሚያዝበት ነው።"},
                    {q: "Radioactive materials can be found on", o:["Exciters", "Spark plugs", "Fuel lines", "Turbines"], e: "አንዳንድ የድሮ ማቀጣጠያ ኤክሳይተሮች ውስጥ የጋዝ አዮናይዜሽንን ለማገዝ አነስተኛ መጠን ያለው ራዲዮአክቲቭ ማቴሪያል ይገኛል።"},
                    {q: "What does a vibration do?", o: ["Change DC to AC", "Change AC to DC", "Store power", "Release energy"], e: "በድሮ ማቀጣጠያዎች ውስጥ ቫይብሬተር (Vibrator) ቀጥታ የኤሌክትሪክ ፍሰትን (DC) ወደ ተለዋዋጭ ቮልቴጅ (AC) ለመቀየር ያገለግል ነበር። (Note: question likely meant vibrator, not vibration)."},
                    {q: "AVM display vibration level on secondary display in unit", o: ["Unit less", "RPM", "Percent", "Hz"], e: "የዘመናዊ AVM የንዝረት መለኪያዎች ቁጥርን የሚያሳዩት ያለ ምንም መለኪያ (Unitless scale) ነው።"},
                    {q: "When the starter generator is used as a generator is used the winding", o:["Shunt", "Series", "Parallel", "Both"], e: "በስታርተር-ጄኔሬተር ውስጥ 'Shunt' ዊንዲንጎች ሲስተሙ ኃይል አምራች ሆኖ ሲሰራ ጥቅም ላይ ይውላሉ።"},
                    {q: "AVM locating display", o:["Secondary engine display", "Primary flight display", "Primary engine display", "Overhead panel"], e: "የንዝረት መለኪያ (AVM) መረጃ በአብዛኛው በሁለተኛ ደረጃ (Secondary engine display) ላይ ይገኛል።"},
                    {q: "To control air pressure inter to air pneumatic starter", o:["Pressure regulator and shutoff valve", "Bleed air valve", "Fuel valve", "Anti-ice valve"], e: "ወደ ማስነሻው የሚገባውን ከፍተኛ የአየር ግፊት ለማስተካከል PRSOV ጥቅም ላይ ይውላል።"},
                    {q: "Flame out", o:["Accidentally the engine goes off", "Normal shutdown", "Fire in engine", "Compressor surge"], e: "ፍሌም-አውት ማለት ሞተሩ እየሰራ እያለ በድንገት እሳቱ ሲጠፋ የሚፈጠር ክስተት ነው።"},
                    {q: "Sequence of starting", o:["Air-Ignition-Fuel", "Fuel-Air-Ignition", "Air- Fuel-Ignition", "Ignition-Fuel-Air"], e: "የማስነሳት ትክክለኛ ቅደም ተከተል፡ መጀመሪያ አየር፣ ከዚያ ማቀጣጠል፣ በመጨረሻ ነዳጅ።"},
                    {q: "Continues ignition is used in during takeoff and landing", o: ["True", "False"], e: "የማያቋርጥ ማቀጣጠያ አውሮፕላን ሲነሳ እና ሲያርፍ ድንገት ሞተር እንዳይጠፋ እንደ ዋስትና ያገለግላል።"},
                    {q: "Discharge resistor to discharge when circuit is off", o: ["True", "False"], e: "የመልቀቂያ ሬዚስተሮች፣ ሲስተሙ ሲጠፋ የተረፈውን ቮልቴጅ በደህንነት ለማስለቀቅ ያገለግላሉ።"},
                    {q: "Which of the following is not an air source for air starter?", o: ["Ambient air", "GPU", "APU", "Cross bleed"], e: "ሞተርን ለማስነሳት ከባቢ አየር (Ambient air) በራሱ በቂ ግፊት ስለሌለው አያገለግልም።"},
                    {q: "Secondary indication are displayed on", o:["Center lower display", "Center upper display", "Primary display", "Captain's display"], e: "እንደ N2፣ ዘይት ግፊት ያሉ ሁለተኛ ደረጃ መረጃዎች በታችኛው ማዕከላዊ ስክሪን (Center lower display) ላይ ይታያሉ።"}
                ]
            }
        ];

        let currentExamIndex = 0;
        let currentQuestionIndex = 0;
        let score = 0;
        let selectedOption = -1;
        let correctOptionIndex = -1; // Tracks where the correct option went after shuffling

        // Fisher-Yates Shuffle algorithm
        function shuffleOptions(options) {
            let shuffled = [...options];
            let correctValue = shuffled[0]; // The first item is always correct in our DB
            
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));[shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            
            return {
                shuffledOptions: shuffled,
                correctIndex: shuffled.indexOf(correctValue)
            };
        }

        // Initialize the Home Page
        function init() {
            const listContainer = document.getElementById('exam-list-container');
            listContainer.innerHTML = '';
            
            examsData.forEach((exam, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.innerText = exam.title;
                btn.onclick = () => startExam(index);
                listContainer.appendChild(btn);
            });
        }

        // Start an Exam
        function startExam(index) {
            currentExamIndex = index;
            currentQuestionIndex = 0;
            score = 0;
            
            document.getElementById('home-page').classList.add('hidden');
            document.getElementById('result-page').classList.add('hidden');
            document.getElementById('quiz-page').classList.remove('hidden');
            
            document.getElementById('quiz-title').innerText = examsData[index].title;
            
            renderQuestion();
        }

        // Render current question
        function renderQuestion() {
            const exam = examsData[currentExamIndex];
            const qData = exam.questions[currentQuestionIndex];
            selectedOption = -1;

            document.getElementById('progress-indicator').innerText = `Question ${currentQuestionIndex + 1} of ${exam.questions.length}`;
            document.getElementById('question-text').innerText = qData.q;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            // Shuffle the options before displaying
            const shuffleResult = shuffleOptions(qData.o);
            correctOptionIndex = shuffleResult.correctIndex;
            
            shuffleResult.shuffledOptions.forEach((opt, idx) => {
                const optDiv = document.createElement('div');
                optDiv.className = 'option';
                optDiv.innerText = `${String.fromCharCode(65 + idx)}) ${opt}`;
                optDiv.onclick = () => selectOption(idx, optDiv);
                optionsContainer.appendChild(optDiv);
            });

            document.getElementById('submit-btn').classList.remove('hidden');
            document.getElementById('next-btn').classList.add('hidden');
            document.getElementById('explanation-container').classList.add('hidden');
            document.getElementById('submit-btn').disabled = true;
        }

        // Handle option selection
        function selectOption(index, element) {
            // If already submitted, prevent changing
            if(!document.getElementById('submit-btn').classList.contains('hidden') === false) return;

            selectedOption = index;
            const allOptions = document.querySelectorAll('.option');
            allOptions.forEach(opt => opt.classList.remove('selected'));
            element.classList.add('selected');
            document.getElementById('submit-btn').disabled = false;
        }

        // Submit the answer and show feedback/explanation
        function submitAnswer() {
            if (selectedOption === -1) return;

            const exam = examsData[currentExamIndex];
            const qData = exam.questions[currentQuestionIndex];
            const allOptions = document.querySelectorAll('.option');

            // Highlight Correct and Incorrect
            allOptions.forEach((opt, idx) => {
                if (idx === correctOptionIndex) {
                    opt.classList.add('correct');
                } else if (idx === selectedOption) {
                    opt.classList.add('incorrect');
                }
                opt.style.pointerEvents = 'none'; // Disable further clicking
            });

            if (selectedOption === correctOptionIndex) {
                score++;
            }

            // Show explanation
            document.getElementById('explanation-text').innerText = qData.e;
            document.getElementById('explanation-container').classList.remove('hidden');

            // Toggle buttons
            document.getElementById('submit-btn').classList.add('hidden');
            
            if (currentQuestionIndex < exam.questions.length - 1) {
                document.getElementById('next-btn').innerText = "Next Question";
            } else {
                document.getElementById('next-btn').innerText = "Show Results";
            }
            document.getElementById('next-btn').classList.remove('hidden');
        }

        // Move to next question or end exam
        function nextQuestion() {
            const exam = examsData[currentExamIndex];
            if (currentQuestionIndex < exam.questions.length - 1) {
                currentQuestionIndex++;
                renderQuestion();
            } else {
                showResults();
            }
        }

        // Show final score
        function showResults() {
            document.getElementById('quiz-page').classList.add('hidden');
            document.getElementById('result-page').classList.remove('hidden');
            
            const exam = examsData[currentExamIndex];
            document.getElementById('final-score').innerText = `${score} / ${exam.questions.length}`;
        }

        // Restart current exam
        function restartExam() {
            startExam(currentExamIndex);
        }

        // Back to Home page
        function backToHome() {
            document.getElementById('quiz-page').classList.add('hidden');
            document.getElementById('result-page').classList.add('hidden');
            document.getElementById('home-page').classList.remove('hidden');
        }

        // Initialize App
        init();
    </script>
</body>
